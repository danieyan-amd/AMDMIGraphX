name: ROCm Runner Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: [self-hosted, performance, amd, rocm]
    steps:
      - name: Print runner info
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Labels: $RUNNER_OS $RUNNER_ARCH"
          /opt/rocm/bin/rocm-smi || true
