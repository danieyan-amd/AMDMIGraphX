name: Model Zoo Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  model-zoo-tests:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install test dependencies
        run: pip install -r tools/model_zoo/test_generator/requirements.txt

      - name: Init timestamp
        id: ts
        run: echo "stamp=$(date -u +%Y%m%dT%H%M%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run model-zoo tests and capture logs
        env:
          TARGET: gpu
          ATOL: 0.001
          RTOL: 0.001
          RUN_TS: ${{ steps.ts.outputs.stamp }}
        run: |
          set -eo pipefail
          export PYTHONPATH=/opt/rocm/lib:$PYTHONPATH

          ROOT="logs/${RUN_TS}"
          mkdir -p "${ROOT}/fp16" "${ROOT}/fp32"
          echo "${RUN_TS}" > "${ROOT}/run.timestamp"

          # sanity check the dataset path
          ls -ld /usr/share/migraphx/migraph_datasets

          # run your tester on the system datasets; per-model logs land in logs/${RUN_TS}/{fp16,fp32}
          bash tools/model_zoo/test_models.sh /usr/share/migraphx/migraph_datasets 2>&1 | tee "${ROOT}/raw.log"

          # optional summaries from the combined stdout
          grep -iE '(^|[^a-z])fp16([^a-z]|$)|half|16-bit' "${ROOT}/raw.log" > "${ROOT}/fp16/summary.log" || true
          grep -iE '(^|[^a-z])fp32([^a-z]|$)|single|32-bit' "${ROOT}/raw.log" > "${ROOT}/fp32/summary.log" || true
          grep -n -i -A2 -B2 'fp16' "${ROOT}/raw.log" > "${ROOT}/fp16/context.log" || true
          grep -n -i -A2 -B2 'fp32' "${ROOT}/raw.log" > "${ROOT}/fp32/context.log" || true

          rm -f logs/latest && ln -s "${RUN_TS}" logs/latest

      - name: Upload logs (timestamped)
        uses: actions/upload-artifact@v4
        with:
          name: model-zoo-logs-${{ steps.ts.outputs.stamp }}
          path: logs/${{ steps.ts.outputs.stamp }}
          if-no-files-found: error
